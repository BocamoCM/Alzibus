version: '3.8'

services:
  # ─── Base de Datos (PostgreSQL) ───
  db:
    image: postgres:15-alpine
    container_name: alzibus_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-alzibus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alzibus_password}
      POSTGRES_DB: ${DB_NAME:-alzibus_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alzibus-net

  # ─── API Backend (Node.js) ───
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: alzibus_backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-alzibus_user}
      - DB_PASSWORD=${DB_PASSWORD:-alzibus_password}
      - DB_NAME=${DB_NAME:-alzibus_db}
      - JWT_SECRET=${JWT_SECRET}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      # Reemplaza con tus variables necesarias
    networks:
      - alzibus-net

  # ─── Website (Nginx) ───
  website:
    image: nginx:alpine
    container_name: alzibus_website
    restart: always
    volumes:
      - ./website:/usr/share/nginx/html
      - ./website/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - alzibus-net

  # ─── Proxy Inverso (Caddy) ───
  # NOTA: Caddy gestiona SSL de forma automática.
  # El puerto 80 y 443 deben estar abiertos en la Pi.
  proxy:
    image: lucaslorentz/caddy-docker-proxy:2.8-alpine
    container_name: alzibus_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - alzibus-net

networks:
  alzibus-net:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
