plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.alzitrans.app"
    compileSdk 36
    ndkVersion "27.0.12077973"

    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // Forzar versiones ESTABLES de Glance / Compose Remote.
    //
    // Sin esto, home_widget arrastra alpha 1.3.0-alpha01 de Glance, que a su
    // vez exige Android Gradle Plugin 9.x + compileSdk 37. Como AGP 9 sigue
    // en alpha, no podemos subir aún sin romper otras cosas. Fijamos Glance
    // 1.1.1 (último estable) y se acabó el problema — el widget de home
    // sigue funcionando porque la API estable cubre todo lo que usamos.
    //
    // Cuando AGP 9 sea estable (Q3 2026 aprox), borrar este bloque y
    // actualizar compileSdk a 37+.
    configurations.all {
        resolutionStrategy {
            force 'androidx.glance:glance:1.1.1'
            force 'androidx.glance:glance-appwidget:1.1.1'
        }
    }

    defaultConfig {
        applicationId "com.alzitrans.app"
        minSdkVersion 24
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Si existe `android/key.properties` (build local con tu keystore
            // real), firmamos con la upload key de Play Store. Si no existe
            // (CI de GitHub Actions, donde no subimos el keystore), caemos a
            // firma debug: el APK queda sideloadeable pero NO subible a Play
            // Store. Sin este fallback el build de CI peta con
            // "SigningConfig 'release' is missing required property 'storeFile'".
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }

            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            packaging {
                jniLibs {
                    useLegacyPackaging true
                }
                resources {
                    excludes += '/META-INF/{AL2.0,LGPL2.1}'
                }
                doNotStrip "**/*.so"
            }

            // ⚡ Habilitar debug symbols para Google Play
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.google.android.material:material:1.12.0'

    // ============================================================
    // AdMob Mediation adapters
    // ------------------------------------------------------------
    // Descomenta cada bloque cuando tengas la cuenta + IDs creados
    // en la red correspondiente Y el grupo de mediación en AdMob.
    // Versiones a 2026-04. Última: developers.google.com/admob/android/mediation/<red>
    // ============================================================

    // --- AppLovin MAX ---
    // implementation 'com.google.ads.mediation:applovin:13.0.1.0'

    // --- Meta Audience Network ---
    // implementation 'com.google.ads.mediation:facebook:6.18.0.0'

    // --- Unity Ads ---
    // implementation 'com.google.ads.mediation:unity:4.12.3.0'
}