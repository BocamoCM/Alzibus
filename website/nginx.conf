server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy para el QR (redirige internamente al backend)
    location /qr {
        proxy_pass http://alzibus_backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Página de descarga QR
    location /descargar {
        try_files $uri $uri/ /descargar/index.html;
    }

    # ════════════════════════════════════════════════════════════════
    # CACHE CONTROL — orden importante (las reglas más específicas van
    # ARRIBA, nginx evalúa la primera ubicación que coincida).
    # ════════════════════════════════════════════════════════════════
    #
    # PROBLEMA HISTÓRICO: antes esto era `location ~* \.(js|css|...)$ {
    # expires 30d; }` para TODO. Eso cacheaba `flutter_bootstrap.js` y
    # `main.dart.js` durante 30 días sin cache-busting. Cuando cambiaba
    # el flujo de auth (p.ej. el 11/05/2026 quitamos el OTP del registro),
    # los usuarios que ya habían visitado /app/ seguían ejecutando el
    # bundle viejo durante 30 días → el frontend pedía un OTP que el
    # backend nuevo ya no enviaba → "no me llega el código de registro".
    # El login normal sí funcionaba (mismo endpoint que antes).
    #
    # Solución: los ficheros que actúan como "punto de entrada" (HTML,
    # bootstrap, service worker) NO se cachean. Solo se cachean assets
    # versionados por contenido (canvaskit con hash en URL gstatic, etc.)
    # y recursos estáticos no críticos (imágenes).

    # 1️⃣  Entry points de Flutter Web — NUNCA cachear.
    #     Estos ficheros pequeños deben revalidarse en cada carga para
    #     que el navegador descubra cualquier cambio (nuevo SW version,
    #     nuevo hash de main.dart.js, etc.).
    location ~* /(flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|flutter\.js|manifest\.json|index\.html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # 2️⃣  HTML siempre revalidado — para que cambios en la landing/legales
    #     se propaguen al instante.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    # 3️⃣  Assets pesados (canvaskit, fonts, imágenes) — cache largo.
    #     Estos sí son seguros: o tienen hash en el nombre, o son
    #     contenido estático que no rompe nada si llega un día tarde.
    location ~* \.(wasm|woff|woff2|ttf|otf|png|jpg|jpeg|gif|ico|svg|webp|css)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Error Pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
