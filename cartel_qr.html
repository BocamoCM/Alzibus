<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartel QR — Alzitrans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ============================
           CONFIGURACIÓN DE IMPRESIÓN
           ============================ */
        @page {
            size: A4 portrait;
            margin: 0mm; /* Elimina cabeceras y pies de página del navegador */
        }

        @media print {
            body { 
                background: white; 
                margin: 0;
                padding: 0;
            }
            .poster { 
                box-shadow: none; 
                border: none;
                width: 210mm; /* Ancho A4 */
                height: 297mm; /* Alto A4 */
            }
        }

        /* ============================
           VISTA EN PANTALLA
           ============================ */
        body {
            font-family: 'Outfit', sans-serif;
            background: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 0;
            margin: 0;
        }

        /* ============================
           POSTER — Escala A4
           ============================ */
        .poster {
            width: 210mm;
            height: 297mm;
            background: white;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* ── Banda superior — Ahora en blanco sin borde ── */
        .top-band {
            background: white;
            color: black;
            text-align: center;
            padding: 10mm 10mm 5mm;
        }

        .top-label {
            font-size: 16pt;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4mm;
        }

        .top-headline {
            font-size: 48pt;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .top-sub {
            font-size: 15pt;
            font-weight: 500;
            margin-top: 6mm;
            line-height: 1.4;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Cuerpo central ── */
        .body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10mm 15mm;
            gap: 10mm;
        }

        /* Recuadro QR */
        .qr-box {
            width: 110mm;
            height: 110mm;
            border: 3pt solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        /* Esquinas decorativas del QR */
        .qr-box::before, .qr-box::after {
            content: '';
            position: absolute;
            width: 15mm;
            height: 15mm;
            border-color: black;
            border-style: solid;
        }

        .qr-box::before {
            top: -6pt;
            left: -6pt;
            border-width: 6pt 0 0 6pt;
        }

        .qr-box::after {
            bottom: -6pt;
            right: -6pt;
            border-width: 0 6pt 6pt 0;
        }

        .qr-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5mm;
            opacity: 0.2;
        }

        .qr-placeholder svg { width: 40mm; height: 40mm; }

        .qr-placeholder span {
            font-size: 11pt;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Instrucción */
        .scan-label {
            font-size: 13pt;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4mm;
        }

        .scan-label::before, .scan-label::after {
            content: '';
            display: block;
            width: 15mm;
            height: 1.5pt;
            background: black;
        }

        /* Beneficios */
        .benefits {
            list-style: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2mm;
        }

        .benefits li {
            font-size: 9.5pt;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 2.5mm;
            padding: 2mm 3mm;
            border: 1pt solid #ccc;
            border-radius: 2mm;
        }

        .benefits li .ico {
            font-size: 12pt;
            flex-shrink: 0;
        }

        /* ── Banda inferior ── */
        .bottom-band {
            background: white;
            color: black;
            padding: 10mm 8mm;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10mm;
        }

        .app-name-big {
            font-size: 28pt;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .app-meta {
            text-align: left;
        }

        .app-meta .free {
            font-size: 13pt;
            font-weight: 700;
        }

        .app-meta .platform {
            font-size: 8pt;
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Línea separadora zigzag entre bandas */
        .zigzag {
            height: 5mm;
            background: black;
            clip-path: polygon(
                0% 100%, 2% 0%, 4% 100%, 6% 0%, 8% 100%,
                10% 0%, 12% 100%, 14% 0%, 16% 100%, 18% 0%,
                20% 100%, 22% 0%, 24% 100%, 26% 0%, 28% 100%,
                30% 0%, 32% 100%, 34% 0%, 36% 100%, 38% 0%,
                40% 100%, 42% 0%, 44% 100%, 46% 0%, 48% 100%,
                50% 0%, 52% 100%, 54% 0%, 56% 100%, 58% 0%,
                60% 100%, 62% 0%, 64% 100%, 66% 0%, 68% 100%,
                70% 0%, 72% 100%, 74% 0%, 76% 100%, 78% 0%,
                80% 100%, 82% 0%, 84% 100%, 86% 0%, 88% 100%,
                90% 0%, 92% 100%, 94% 0%, 96% 100%, 98% 0%,
                100% 100%
            );
        }
    </style>
</head>
<body>

    <!-- LIBRERIA PARA GENERAR QR (kjua: ligera y rápida) -->
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>

    <div class="poster">

        <!-- BANDA SUPERIOR -->
        <div class="top-band">
            <div class="top-label">Bus Alzira</div>
            <div class="top-headline">¿Cuándo llega<br>el bus?</div>
            <div class="top-sub">Escanea y consulta el tiempo real<br>de todas las paradas de Alzira</div>
        </div>

        <!-- CUERPO -->
        <div class="body">

            <div class="scan-label">Escanea para descargar</div>

            <!-- CONTENEDOR DEL QR GENERADO -->
            <div class="qr-box" id="qr-container">
                <!-- El QR se generará aquí automáticamente -->
            </div>

            <!-- BENEFICIOS -->
            <ul class="benefits">
                <li><span class="ico">⏱</span> Tiempos de llegada en directo</li>
                <li><span class="ico">🔔</span> Alertas minutos antes de llegar</li>
                <li><span class="ico">💳</span> Tu tarjeta de transporte NFC</li>
            </ul>

        </div>

        <!-- BANDA INFERIOR -->
        <div class="bottom-band">
            <div class="app-name-big">Alzitrans</div>
            <div class="app-meta">
                <div class="free">App 100% Gratis</div>
                <div class="platform">Descarga para Android</div>
            </div>
        </div>

    </div>

    <script>
        // GENERAR QR AUTOMÁTICAMENTE PARA EL CARTEL
        const qrContent = "https://alzitrans.duckdns.org/qr";
        
        const qrElement = kjua({
            render: 'svg', // SVG es mejor para imprimir sin perder calidad
            text: qrContent,
            size: 400,
            fill: '#000000',
            back: '#ffffff',
            rounded: 0,
            quiet: 1,
            mumble: true
        });

        document.getElementById('qr-container').appendChild(qrElement);
    </script>
</body>
</html>
