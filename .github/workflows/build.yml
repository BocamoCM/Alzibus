name: Build, Tag & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Fix Kotlin deprecation in nfc_manager
        run: sed -i 's/toLowerCase(/lowercase(/g' ~/.pub-cache/hosted/pub.dev/nfc_manager-*/android/src/main/kotlin/io/flutter/plugins/nfcmanager/Translator.kt || true

      - name: Get Base Version
        id: version
        run: |
          BASE=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'.' -f1,2)
          FULL_VERSION="${BASE}.${{ github.run_number }}"
          echo "VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --debug --build-name=${{ steps.version.outputs.VERSION }} --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Pass Version to Release Job
        run: echo "${{ steps.version.outputs.VERSION }}" > version.txt
        
      - name: Upload Version Artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: version.txt

  build-ios:
    runs-on: macos-latest
    name: Build iOS (No Sign)
    needs: build-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --no-codesign --debug

      - name: Zip iOS Build
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-debug-app.zip Runner.app

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: ios-debug-app.zip

  tag-and-release:
    runs-on: ubuntu-latest
    name: Tag & Release
    needs: [build-android, build-ios]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: release

      - name: Download iOS Build
        uses: actions/download-artifact@v4
        with:
          name: ios-debug-app
          path: release

      - name: Download Version
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: version_dir

      - name: Read Version
        id: version
        run: echo "VERSION=$(cat version_dir/version.txt)" >> $GITHUB_OUTPUT

      - name: Check tag
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a v${{ steps.version.outputs.VERSION }} -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: |
            release/app-debug.apk
            release/ios-debug-app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}