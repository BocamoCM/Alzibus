name: Build, Tag & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Permite lanzar el build a mano desde la web de GitHub (Actions →
  # "Build, Tag & Release" → "Run workflow"). Útil para regenerar el
  # APK sin tener que hacer un push a main.
  workflow_dispatch:

permissions:
  contents: write
  # `actions: read` es necesario desde principios de 2024 para que
  # actions/download-artifact@v4 pueda listar artifacts del propio workflow.
  # Sin esto el job tag-and-release fallaba con:
  #   "Failed to ListArtifacts: ... 403 Forbidden"
  actions: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 3.44.0 incluye Dart 3.11.4+ — necesario porque nfc_manager 4.2.1
          # requiere SDK ^3.11.4. Con 3.41.2 (Dart 3.11.0) `pub get` fallaba
          # con "nfc_manager 4.2.1 requires SDK version ^3.11.4".
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Fix Kotlin deprecation in nfc_manager
        run: sed -i 's/toLowerCase(/lowercase(/g' ~/.pub-cache/hosted/pub.dev/nfc_manager-*/android/src/main/kotlin/io/flutter/plugins/nfcmanager/Translator.kt || true

      - name: Get Base Version
        id: version
        run: |
          BASE=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'.' -f1,2)
          FULL_VERSION="${BASE}.${{ github.run_number }}"
          echo "VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        # ADMIN_EMAIL viene de GitHub Secrets — gating del panel debug en
        # ProfileScreen. Si el secret no está configurado, queda vacío y
        # ese panel no aparece en ninguna build.
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.VERSION }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Pass Version to Release Job
        run: echo "${{ steps.version.outputs.VERSION }}" > version.txt
        
      - name: Upload Version Artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: version.txt


  tag-and-release:
    runs-on: ubuntu-latest
    name: Tag & Release
    needs: [build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release


      - name: Download Version
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: version_dir

      - name: Read Version
        id: version
        run: echo "VERSION=$(cat version_dir/version.txt)" >> $GITHUB_OUTPUT

      - name: Check tag
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a v${{ steps.version.outputs.VERSION }} -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: |
            release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}