<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Skin overlay FALLERO/A v2 — diseño más auténtico
       Mantiene viewBox 400x400 para encajar con Albus base. -->

  <defs>
    <linearGradient id="mocadorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#A0091E"/>
    </linearGradient>
    <linearGradient id="fajaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D62828"/>
      <stop offset="50%" stop-color="#B81E1E"/>
      <stop offset="100%" stop-color="#8B0820"/>
    </linearGradient>
  </defs>

  <!-- ═══ MOCADOR (pañuelo) en la cabeza ═══ -->
  <g>
    <!-- Forma principal del pañuelo cubriendo la parte superior -->
    <!-- Curva natural como un paño anudado, no plano -->
    <path d="M 105 100
             Q 130 78 200 72
             Q 270 78 295 100
             Q 305 122 295 142
             L 285 145
             Q 275 130 200 128
             Q 125 130 115 145
             L 105 142
             Q 95 122 105 100 Z"
          fill="url(#mocadorGrad)"
          stroke="#5C0512" stroke-width="2.5"/>

    <!-- Sombra interior del pañuelo (da profundidad) -->
    <path d="M 130 105 Q 200 92 270 105 Q 270 125 200 122 Q 130 125 130 105 Z"
          fill="#8B0820" opacity="0.35"/>

    <!-- NUDO frontal del pañuelo (el clásico que cae a un lado) -->
    <g transform="translate(290, 130)">
      <!-- Base del nudo -->
      <ellipse cx="0" cy="0" rx="13" ry="10" fill="#A0091E"
               stroke="#5C0512" stroke-width="1.8"/>
      <ellipse cx="-2" cy="-2" rx="9" ry="6" fill="#D62828" opacity="0.7"/>
      <!-- Punta colgando del nudo -->
      <path d="M 8 5 L 28 38 L 35 45 L 25 50 L 12 40 L 5 18 Z"
            fill="url(#mocadorGrad)" stroke="#5C0512" stroke-width="1.8"/>
      <!-- Pliegue en la punta -->
      <path d="M 15 25 L 25 45" stroke="#5C0512" stroke-width="0.8" opacity="0.4"/>
    </g>

    <!-- Punta corta cayendo por el otro lado (asimetría natural) -->
    <path d="M 108 130 L 80 158 L 78 168 L 88 168 L 110 152 Z"
          fill="url(#mocadorGrad)" stroke="#5C0512" stroke-width="1.8"/>

    <!-- Lunares blancos típicos del mocador valenciano -->
    <g fill="#FFFFFF" opacity="0.92">
      <circle cx="138" cy="100" r="4.5"/>
      <circle cx="160" cy="115" r="4"/>
      <circle cx="180" cy="98" r="3.8"/>
      <circle cx="200" cy="115" r="4.5"/>
      <circle cx="220" cy="100" r="4"/>
      <circle cx="240" cy="115" r="4.2"/>
      <circle cx="262" cy="102" r="3.8"/>
      <!-- Lunares más pequeños rellenando -->
      <circle cx="150" cy="125" r="2.5" opacity="0.7"/>
      <circle cx="190" cy="128" r="2.5" opacity="0.7"/>
      <circle cx="230" cy="128" r="2.5" opacity="0.7"/>
      <circle cx="270" cy="125" r="2.5" opacity="0.7"/>
    </g>

    <!-- Highlight superior (brillo) -->
    <path d="M 140 90 Q 200 80 260 90 Q 260 95 200 88 Q 140 95 140 90 Z"
          fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- ═══ FAJA roja anudada alrededor de la cintura ═══ -->
  <g>
    <!-- Cuerpo principal de la faja -->
    <rect x="60" y="291" width="280" height="28" fill="url(#fajaGrad)"
          stroke="#5C0512" stroke-width="2"/>

    <!-- Pliegues definidos de la tela (varias líneas verticales) -->
    <g stroke="#5C0512" stroke-width="0.9" opacity="0.55" fill="none">
      <line x1="80" y1="291" x2="80" y2="319"/>
      <line x1="110" y1="291" x2="110" y2="319"/>
      <line x1="140" y1="291" x2="140" y2="319"/>
      <line x1="170" y1="291" x2="170" y2="319"/>
      <line x1="230" y1="291" x2="230" y2="319"/>
      <line x1="260" y1="291" x2="260" y2="319"/>
      <line x1="290" y1="291" x2="290" y2="319"/>
      <line x1="320" y1="291" x2="320" y2="319"/>
    </g>

    <!-- Highlight superior de la faja (brillo de tela) -->
    <rect x="60" y="291" width="280" height="6" fill="#FFFFFF" opacity="0.18"/>

    <!-- Sombra inferior -->
    <rect x="60" y="313" width="280" height="6" fill="#000000" opacity="0.18"/>

    <!-- NUDO de la faja al lado izquierdo con tela cayendo -->
    <g>
      <!-- Base del nudo -->
      <ellipse cx="56" cy="305" rx="12" ry="10" fill="#A0091E"
               stroke="#5C0512" stroke-width="1.8"/>
      <!-- Punta de tela colgando -->
      <path d="M 48 312 L 28 340 L 24 358 L 38 352 L 52 332 Z"
            fill="url(#fajaGrad)" stroke="#5C0512" stroke-width="1.8"/>
      <!-- Pliegue interior -->
      <path d="M 33 335 L 45 348" stroke="#5C0512" stroke-width="0.8" opacity="0.5"/>
      <!-- Otra punta más corta -->
      <path d="M 60 313 L 50 348 L 56 350 L 65 322 Z"
            fill="#A0091E" stroke="#5C0512" stroke-width="1.5"/>
    </g>
  </g>

  <!-- ═══ CLAVELL (clavel rojo) decorativo en el lateral ═══ -->
  <g transform="translate(335, 178)">
    <!-- Hojas verdes -->
    <ellipse cx="-3" cy="9" rx="9" ry="3" fill="#1B5E20" transform="rotate(45)"/>
    <ellipse cx="3" cy="9" rx="9" ry="3" fill="#2E7D32" transform="rotate(-45)"/>
    <ellipse cx="0" cy="14" rx="7" ry="2.5" fill="#388E3C"/>

    <!-- Pétalos exteriores -->
    <circle r="13" fill="#E63946" stroke="#8B0820" stroke-width="1"/>
    <!-- Pétalos en capas (líneas radiales) -->
    <g stroke="#A0091E" stroke-width="0.6" fill="none" opacity="0.6">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="7" y1="-7" x2="-7" y2="7"/>
    </g>
    <!-- Pétalos del medio -->
    <circle r="9" fill="#D62828"/>
    <!-- Pétalos interiores -->
    <circle r="6" fill="#A0091E"/>
    <!-- Centro amarillo (estambres) -->
    <circle r="2.5" fill="#FFE066"/>
    <circle r="1.5" fill="#FFC857"/>
  </g>
</svg>
