<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Skin overlay GRADUADO — birrete + borla dorada + diploma + corbata
       Homenaje al TFC del desarrollador. -->

  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="goldTasselGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD66E"/>
      <stop offset="100%" stop-color="#B5860B"/>
    </linearGradient>
  </defs>

  <!-- ═══ BIRRETE (mortarboard) ═══ -->
  <g>
    <!-- Sombra del birrete sobre el techo -->
    <ellipse cx="200" cy="113" rx="75" ry="5" fill="#000" opacity="0.25"/>

    <!-- Casquete (cilindro inferior) -->
    <ellipse cx="200" cy="100" rx="50" ry="14" fill="url(#capGrad)"
             stroke="#000" stroke-width="2"/>
    <rect x="150" y="75" width="100" height="25" fill="url(#capGrad)"
          stroke="#000" stroke-width="2"/>
    <ellipse cx="200" cy="75" rx="50" ry="14" fill="#252525"
             stroke="#000" stroke-width="2"/>

    <!-- Plataforma cuadrada superior (mortarboard plana) -->
    <g transform="translate(200, 70)">
      <path d="M -80 0 L 0 -22 L 80 0 L 0 22 Z"
            fill="url(#capGrad)"
            stroke="#000" stroke-width="2.5"/>
      <!-- Highlight superior izquierdo de la plataforma -->
      <path d="M -78 -2 L 0 -20 L 0 -16 L -76 1 Z"
            fill="#3A3A3A" opacity="0.7"/>
      <!-- Borde lateral derecho oscuro -->
      <path d="M 78 -2 L 0 -20 L 0 -16 L 76 1 Z"
            fill="#000" opacity="0.5"/>
    </g>

    <!-- Botón central donde se ata la borla -->
    <circle cx="200" cy="70" r="4" fill="url(#goldTasselGrad)"
            stroke="#7A5A07" stroke-width="0.8"/>

    <!-- Cuerda de la borla colgando -->
    <path d="M 200 70 Q 222 65 240 90"
          stroke="url(#goldTasselGrad)" stroke-width="2.5" fill="none"
          stroke-linecap="round"/>

    <!-- BORLA dorada al final de la cuerda -->
    <g transform="translate(240, 95)">
      <!-- Anillo de sujeción -->
      <ellipse cx="0" cy="-3" rx="5" ry="2.5" fill="url(#goldTasselGrad)"
               stroke="#7A5A07" stroke-width="0.8"/>
      <!-- Hilos colgando -->
      <g stroke="url(#goldTasselGrad)" stroke-width="2.2" stroke-linecap="round">
        <line x1="-4" y1="0" x2="-5" y2="18"/>
        <line x1="-1.5" y1="0" x2="-2" y2="20"/>
        <line x1="1" y1="0" x2="0.5" y2="22"/>
        <line x1="3" y1="0" x2="4" y2="20"/>
        <line x1="5" y1="0" x2="6" y2="18"/>
      </g>
      <!-- Punta inferior (tassel knot) -->
      <ellipse cx="0" cy="22" rx="6" ry="3" fill="url(#goldTasselGrad)"
               stroke="#7A5A07" stroke-width="0.8"/>
    </g>
  </g>

  <!-- ═══ CORBATA elegante alrededor del cuello (donde la línea amarilla) ═══ -->
  <g>
    <!-- Corbata negra clásica -->
    <path d="M 195 268 L 205 268 L 215 295 L 200 322 L 185 295 Z"
          fill="#1A1A1A" stroke="#000" stroke-width="1.5"/>
    <!-- Nudo de la corbata -->
    <rect x="190" y="262" width="20" height="12" fill="#1A1A1A"
          stroke="#000" stroke-width="1.5"/>
    <!-- Highlight de la corbata -->
    <path d="M 198 274 L 202 274 L 204 300 L 200 315 L 196 300 Z"
          fill="#3A3A3A" opacity="0.7"/>
  </g>

  <!-- ═══ DIPLOMA enrollado al lado ═══ -->
  <g transform="translate(60, 215)">
    <!-- Sombra del diploma -->
    <rect x="-2" y="2" width="44" height="60" fill="#000" opacity="0.2" rx="3"/>
    <!-- Pergamino (color crema) -->
    <rect x="0" y="0" width="42" height="58" fill="#FAEBC8" rx="3"
          stroke="#A88845" stroke-width="1.2"/>
    <!-- Líneas de "texto" simuladas -->
    <g stroke="#8B6F2E" stroke-width="0.8" opacity="0.6">
      <line x1="5" y1="10" x2="37" y2="10"/>
      <line x1="5" y1="15" x2="32" y2="15"/>
      <line x1="5" y1="20" x2="37" y2="20"/>
      <line x1="5" y1="25" x2="30" y2="25"/>
      <line x1="5" y1="30" x2="37" y2="30"/>
      <line x1="5" y1="35" x2="33" y2="35"/>
    </g>
    <!-- Sello rojo abajo -->
    <circle cx="32" cy="48" r="6" fill="#C8102E" stroke="#7A0820" stroke-width="0.8"/>
    <text x="32" y="51" text-anchor="middle"
          font-family="Times, serif" font-size="6"
          font-weight="bold" fill="#FFFFFF">✓</text>
    <!-- Cinta dorada del diploma -->
    <path d="M 8 48 Q 18 53 28 48" stroke="url(#goldTasselGrad)"
          stroke-width="2" fill="none"/>
    <!-- Cinta del enrollado en la parte superior -->
    <rect x="-3" y="-2" width="48" height="6" fill="#C8102E"
          stroke="#7A0820" stroke-width="1" rx="1"/>
    <line x1="21" y1="-2" x2="21" y2="4" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- ═══ Pequeñas estrellas dorada de celebración ═══ -->
  <g fill="url(#goldTasselGrad)" stroke="#7A5A07" stroke-width="0.5">
    <g transform="translate(335, 80)">
      <path d="M 0 -8 L 2.4 -2.4 L 8 -2.4 L 3.6 1.6 L 5.6 7.2 L 0 4 L -5.6 7.2 L -3.6 1.6 L -8 -2.4 L -2.4 -2.4 Z"/>
    </g>
    <g transform="translate(350, 200)">
      <path d="M 0 -6 L 1.8 -1.8 L 6 -1.8 L 2.7 1.2 L 4.2 5.4 L 0 3 L -4.2 5.4 L -2.7 1.2 L -6 -1.8 L -1.8 -1.8 Z"/>
    </g>
  </g>
</svg>
