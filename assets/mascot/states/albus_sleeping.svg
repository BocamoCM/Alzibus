<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- ALBUS · estado SLEEPING — ojos cerrados, "Zzz" flotante, luz tenue -->
  <defs>
    <linearGradient id="busBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6A2A58"/>
      <stop offset="55%" stop-color="#3D1830"/>
      <stop offset="100%" stop-color="#2A1024"/>
    </linearGradient>
    <radialGradient id="windshield" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#A8C8DD"/>
      <stop offset="100%" stop-color="#5C8AA8"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="372" rx="135" ry="14" fill="#000" opacity="0.18"/>

  <!-- Ligera inclinación adelante (cabeceando del sueño) -->
  <g filter="url(#shadow)" transform="rotate(3, 200, 220)">
    <rect x="65" y="95" width="270" height="245" rx="58" ry="58" fill="url(#busBody)"/>
    <path d="M 90 100 Q 200 80 310 100 L 310 130 Q 200 110 90 130 Z" fill="#8B3A6E" opacity="0.3"/>
    <path d="M 100 142 Q 100 122 122 122 L 278 122 Q 300 122 300 142 L 300 222 Q 300 238 282 238 L 118 238 Q 100 238 100 222 Z"
          fill="url(#windshield)" stroke="#2A0F26" stroke-width="3"/>

    <!-- Ojos cerrados (líneas curvas tipo "u" invertida) -->
    <path d="M 145 180 Q 167 195 189 180" stroke="#2A0F26" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 211 180 Q 233 195 255 180" stroke="#2A0F26" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Pestañas cortas -->
    <line x1="155" y1="172" x2="153" y2="166" stroke="#2A0F26" stroke-width="2" stroke-linecap="round"/>
    <line x1="167" y1="170" x2="167" y2="164" stroke="#2A0F26" stroke-width="2" stroke-linecap="round"/>
    <line x1="179" y1="172" x2="181" y2="166" stroke="#2A0F26" stroke-width="2" stroke-linecap="round"/>
    <line x1="221" y1="172" x2="219" y2="166" stroke="#2A0F26" stroke-width="2" stroke-linecap="round"/>
    <line x1="233" y1="170" x2="233" y2="164" stroke="#2A0F26" stroke-width="2" stroke-linecap="round"/>
    <line x1="245" y1="172" x2="247" y2="166" stroke="#2A0F26" stroke-width="2" stroke-linecap="round"/>

    <ellipse cx="130" cy="225" rx="14" ry="7" fill="#FF6B9D" opacity="0.45"/>
    <ellipse cx="270" cy="225" rx="14" ry="7" fill="#FF6B9D" opacity="0.45"/>

    <!-- Boca pequeña relajada / suspirando -->
    <path d="M 190 255 Q 200 252 210 255" stroke="#2A0F26" stroke-width="4" stroke-linecap="round" fill="none"/>

    <rect x="72" y="250" width="22" height="42" rx="6" fill="url(#windshield)" stroke="#2A0F26" stroke-width="2"/>
    <rect x="306" y="250" width="22" height="42" rx="6" fill="url(#windshield)" stroke="#2A0F26" stroke-width="2"/>
    <rect x="65" y="305" width="270" height="9" fill="#FFC857" opacity="0.7"/>
  </g>

  <!-- Manos relajadas -->
  <circle cx="55" cy="280" r="20" fill="#FFF" stroke="#2A0F26" stroke-width="2.5"/>
  <circle cx="345" cy="280" r="20" fill="#FFF" stroke="#2A0F26" stroke-width="2.5"/>

  <g>
    <circle cx="130" cy="345" r="27" fill="#1A0A18" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="130" cy="345" r="13" fill="#555"/>
    <circle cx="130" cy="345" r="5" fill="#1A0A18"/>
    <circle cx="270" cy="345" r="27" fill="#1A0A18" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="270" cy="345" r="13" fill="#555"/>
    <circle cx="270" cy="345" r="5" fill="#1A0A18"/>
  </g>

  <!-- Antena con luz muy tenue (modo nocturno) -->
  <g>
    <rect x="195" y="78" width="10" height="20" fill="#3D1830"/>
    <circle cx="200" cy="72" r="11" fill="#8B7355" stroke="#5A4A33" stroke-width="1.5">
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Zzz flotantes -->
  <g font-family="Arial Black, sans-serif" font-weight="900" fill="#4A1D3D" stroke="#2A0F26" stroke-width="1.5">
    <text x="290" y="100" font-size="28">z
      <animateTransform attributeName="transform" type="translate"
                        values="0,0; 5,-6; 0,0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </text>
    <text x="320" y="75" font-size="36">z
      <animateTransform attributeName="transform" type="translate"
                        values="0,0; 8,-10; 0,0" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    </text>
    <text x="355" y="45" font-size="48">Z
      <animateTransform attributeName="transform" type="translate"
                        values="0,0; 10,-15; 0,0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
