<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- ALBUS · estado SAD — boca hacia abajo, cejas tristes, lágrima -->
  <defs>
    <linearGradient id="busBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6A2A58"/>
      <stop offset="55%" stop-color="#3D1830"/>
      <stop offset="100%" stop-color="#2A1024"/>
    </linearGradient>
    <radialGradient id="windshield" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C5D9E8"/>
      <stop offset="100%" stop-color="#7A9AAE"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="372" rx="135" ry="14" fill="#000" opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="65" y="95" width="270" height="245" rx="58" ry="58" fill="url(#busBody)"/>
    <path d="M 90 100 Q 200 80 310 100 L 310 130 Q 200 110 90 130 Z" fill="#7B3260" opacity="0.35"/>
    <path d="M 100 142 Q 100 122 122 122 L 278 122 Q 300 122 300 142 L 300 222 Q 300 238 282 238 L 118 238 Q 100 238 100 222 Z"
          fill="url(#windshield)" stroke="#2A0F26" stroke-width="3"/>
    <path d="M 122 142 Q 138 134 155 138 L 178 198 Q 168 208 158 203 Z" fill="#FFF" opacity="0.35"/>

    <!-- Cejas tristes (en pendiente hacia abajo desde el centro) -->
    <path d="M 145 165 L 189 155" stroke="#2A0F26" stroke-width="4" stroke-linecap="round"/>
    <path d="M 211 155 L 255 165" stroke="#2A0F26" stroke-width="4" stroke-linecap="round"/>

    <!-- Ojos mirando hacia abajo (pupila baja) -->
    <ellipse cx="167" cy="180" rx="28" ry="30" fill="#FFF" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="169" cy="190" r="14" fill="#2A0F26"/>
    <circle cx="173" cy="187" r="5" fill="#FFF"/>
    <ellipse cx="233" cy="180" rx="28" ry="30" fill="#FFF" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="235" cy="190" r="14" fill="#2A0F26"/>
    <circle cx="239" cy="187" r="5" fill="#FFF"/>

    <!-- Mejillas pálidas -->
    <ellipse cx="130" cy="225" rx="14" ry="7" fill="#FF6B9D" opacity="0.35"/>
    <ellipse cx="270" cy="225" rx="14" ry="7" fill="#FF6B9D" opacity="0.35"/>

    <!-- Boca hacia abajo (frown) -->
    <path d="M 175 260 Q 200 240 225 260" stroke="#2A0F26" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Lágrima cayendo del ojo izquierdo -->
    <g>
      <path d="M 158 205 Q 152 218 155 230 Q 158 232 161 230 Q 164 218 158 205 Z" fill="#5BA3D5" stroke="#3A7BA8" stroke-width="1.5">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,15; 0,30" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;1;0" dur="2s" repeatCount="indefinite"/>
      </path>
      <ellipse cx="156" cy="210" rx="3" ry="2" fill="#FFF" opacity="0.8">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,15; 0,30" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.8;0" dur="2s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <rect x="72" y="250" width="22" height="42" rx="6" fill="url(#windshield)" stroke="#2A0F26" stroke-width="2"/>
    <rect x="306" y="250" width="22" height="42" rx="6" fill="url(#windshield)" stroke="#2A0F26" stroke-width="2"/>
    <rect x="65" y="305" width="270" height="9" fill="#FFC857" opacity="0.75"/>
  </g>

  <!-- Manos caídas -->
  <circle cx="55" cy="290" r="20" fill="#FFF" stroke="#2A0F26" stroke-width="2.5"/>
  <circle cx="345" cy="290" r="20" fill="#FFF" stroke="#2A0F26" stroke-width="2.5"/>

  <g>
    <circle cx="130" cy="345" r="27" fill="#1A0A18" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="130" cy="345" r="13" fill="#666"/>
    <circle cx="130" cy="345" r="5" fill="#1A0A18"/>
    <circle cx="270" cy="345" r="27" fill="#1A0A18" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="270" cy="345" r="13" fill="#666"/>
    <circle cx="270" cy="345" r="5" fill="#1A0A18"/>
  </g>

  <!-- Antena con luz parpadeo lento (humor bajo) -->
  <g>
    <rect x="195" y="78" width="10" height="20" fill="#3D1830"/>
    <circle cx="200" cy="72" r="11" fill="#A88060" stroke="#7A5A40" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Nubecita encima del bus (mood bajo) -->
  <g opacity="0.7">
    <ellipse cx="100" cy="60" rx="22" ry="12" fill="#9CADBC"/>
    <ellipse cx="115" cy="55" rx="20" ry="14" fill="#9CADBC"/>
    <ellipse cx="130" cy="62" rx="18" ry="10" fill="#9CADBC"/>
  </g>
</svg>
