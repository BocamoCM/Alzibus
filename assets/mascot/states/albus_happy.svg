<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- ALBUS · estado HAPPY — ojos cerrados (^_^), sonrisa enorme, estrellitas -->
  <defs>
    <linearGradient id="busBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A3268"/>
      <stop offset="55%" stop-color="#4A1D3D"/>
      <stop offset="100%" stop-color="#3A1530"/>
    </linearGradient>
    <radialGradient id="windshield" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D6F0FF"/>
      <stop offset="60%" stop-color="#A0D2EE"/>
      <stop offset="100%" stop-color="#7BB8D9"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="372" rx="135" ry="14" fill="#000" opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="65" y="95" width="270" height="245" rx="58" ry="58" fill="url(#busBody)"/>
    <path d="M 90 100 Q 200 80 310 100 L 310 130 Q 200 110 90 130 Z" fill="#9B4D7D" opacity="0.4"/>
    <path d="M 100 142 Q 100 122 122 122 L 278 122 Q 300 122 300 142 L 300 222 Q 300 238 282 238 L 118 238 Q 100 238 100 222 Z"
          fill="url(#windshield)" stroke="#2A0F26" stroke-width="3"/>
    <path d="M 122 142 Q 138 134 155 138 L 178 198 Q 168 208 158 203 Z" fill="#FFF" opacity="0.45"/>

    <!-- Ojos cerrados de felicidad estilo anime (^_^) -->
    <path d="M 142 188 Q 167 165 192 188" stroke="#2A0F26" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 208 188 Q 233 165 258 188" stroke="#2A0F26" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Mejillas más rosas (rubor de felicidad) -->
    <ellipse cx="130" cy="220" rx="20" ry="11" fill="#FF6B9D" opacity="0.75"/>
    <ellipse cx="270" cy="220" rx="20" ry="11" fill="#FF6B9D" opacity="0.75"/>

    <!-- Sonrisa ENORME -->
    <path d="M 160 240 Q 200 280 240 240" stroke="#2A0F26" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Boca rellena interior -->
    <path d="M 168 245 Q 200 275 232 245 Q 200 268 168 245 Z" fill="#FF6B9D"/>
    <!-- Lenguita -->
    <path d="M 184 258 Q 200 268 216 258 Q 200 263 184 258 Z" fill="#E84B7D"/>

    <rect x="72" y="250" width="22" height="42" rx="6" fill="url(#windshield)" stroke="#2A0F26" stroke-width="2"/>
    <rect x="306" y="250" width="22" height="42" rx="6" fill="url(#windshield)" stroke="#2A0F26" stroke-width="2"/>
    <rect x="65" y="305" width="270" height="9" fill="#FFC857"/>
    <rect x="65" y="305" width="270" height="3" fill="#FFD980"/>
  </g>

  <!-- Manos LEVANTADAS celebrando -->
  <g>
    <path d="M 75 270 Q 50 230 35 195" stroke="#2A0F26" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="35" cy="195" r="22" fill="#FFF" stroke="#2A0F26" stroke-width="2.5"/>
    <path d="M 325 270 Q 350 230 365 195" stroke="#2A0F26" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="365" cy="195" r="22" fill="#FFF" stroke="#2A0F26" stroke-width="2.5"/>
  </g>

  <g>
    <circle cx="130" cy="345" r="27" fill="#1A0A18" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="130" cy="345" r="13" fill="#777"/>
    <circle cx="130" cy="345" r="5" fill="#1A0A18"/>
    <circle cx="270" cy="345" r="27" fill="#1A0A18" stroke="#2A0F26" stroke-width="2"/>
    <circle cx="270" cy="345" r="13" fill="#777"/>
    <circle cx="270" cy="345" r="5" fill="#1A0A18"/>
  </g>

  <g>
    <rect x="195" y="78" width="10" height="20" fill="#4A1D3D"/>
    <circle cx="200" cy="72" r="11" fill="#FFC857" stroke="#A67400" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.55;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Estrellitas alrededor -->
  <g fill="#FFC857" stroke="#A67400" stroke-width="1">
    <g transform="translate(50, 90)">
      <path d="M 0 -10 L 3 -3 L 10 -3 L 4.5 2 L 7 9 L 0 5 L -7 9 L -4.5 2 L -10 -3 L -3 -3 Z">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(350, 100)">
      <path d="M 0 -8 L 2.4 -2.4 L 8 -2.4 L 3.6 1.6 L 5.6 7.2 L 0 4 L -5.6 7.2 L -3.6 1.6 L -8 -2.4 L -2.4 -2.4 Z">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(80, 50)">
      <path d="M 0 -6 L 1.8 -1.8 L 6 -1.8 L 2.7 1.2 L 4.2 5.4 L 0 3 L -4.2 5.4 L -2.7 1.2 L -6 -1.8 L -1.8 -1.8 Z">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
