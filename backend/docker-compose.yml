version: '3.8'

services:
  db:
    image: postgres:15
    container_name: alzibus_postgres
    environment:
      POSTGRES_USER: alzibus_user
      POSTGRES_PASSWORD: alzibus_password
      POSTGRES_DB: alzibus_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Este archivo se ejecutará automáticamente la primera vez que se cree la base de datos
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alzibus-net

volumes:
  pgdata:

networks:
  alzibus-net: