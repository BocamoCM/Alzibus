# ==========================================
# docker-compose.yml — Orquestación completa Alzibus
# ==========================================
# Este archivo gestiona DB, API, Website y Proxy SSL.
# Lanzar con: docker compose up -d

services:
  # ─── Base de Datos (PostgreSQL) ───
  db:
    image: postgres:15-alpine
    container_name: alzibus_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-alzibus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alzibus_password}
      POSTGRES_DB: ${DB_NAME:-alzibus_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alzibus-net

  # ─── API Backend (Node.js) ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alzibus_backend
    restart: always
    depends_on:
      - db
    # env_file inyecta el .env entero al contenedor en runtime. Sustituye
    # al patrón anterior de copiar .env dentro de la imagen vía Dockerfile,
    # que filtraba secretos (JWT_SECRET, DB_PASSWORD…) en la imagen Docker.
    env_file:
      - .env
    environment:
      # Estas claves se mantienen como override explícito por si el .env
      # no las tuviera. DB_HOST tiene que ser 'db' (el nombre del service)
      # para que la red interna de Compose resuelva el contenedor de Postgres.
      - DB_HOST=db
      - DB_PORT=5432
      - PORT=3000
      # Ruta de uploads dentro del contenedor. La hacemos coincidir con la
      # ruta del host vía bind mount (ver volumes) para simplificar backups
      # y para que los adjuntos sobrevivan a recreate/rebuild del contenedor.
      - UPLOADS_DIR=/var/lib/alzibus/uploads
    volumes:
      # Bind mount: los adjuntos de soporte viven en el host, no en la
      # capa escribible del contenedor. Si recreas/rebuilders el contenedor
      # los archivos siguen ahí. Backup trivial con rsync sobre /var/lib/alzibus/uploads.
      - /var/lib/alzibus/uploads:/var/lib/alzibus/uploads
    networks:
      - alzibus-net

  # ─── Website (Nginx) ───
  website:
    image: nginx:alpine
    container_name: alzibus_website
    restart: always
    volumes:
      - ../website:/usr/share/nginx/html
      - ../website/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - alzibus-net

  # ─── Proxy Inverso (Caddy) ───
  proxy:
    image: lucaslorentz/caddy-docker-proxy:2.8-alpine
    container_name: alzibus_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - alzibus-net

networks:
  alzibus-net:
    driver: bridge

volumes:
  pgdata:
    external: true
    name: backend_pgdata
  caddy_data:
  caddy_config: