
name: alzitrans
description: Aplicación para ver paradas de bus en Alzira y leer tarjetas NFC MIFARE Classic 1K
publish_to: 'none'
version: 5.2.7+38

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  flutter_local_notifications: ^18.0.1
  # flutter_nfc_kit eliminado: el código solo usa nfc_manager (lib/core/providers/nfc_controller.dart).
  # Tener dos plugins NFC inflaba el AAB y aumentaba la superficie de fallos.
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.3.3
  vibration: ^2.0.0
  http: ^1.2.2
  # Necesario para fijar MediaType en MultipartFile de Dio (uploads de soporte).
  http_parser: ^4.0.2
  html: ^0.15.4
  device_info_plus: 11.3.0
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.2
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7
  home_widget: ^0.8.1
  package_info_plus: ^8.0.0
  # 4.2.1 incluye explícitamente "Fixes crash when re-opening the app from
  # background" — la NullPointerException de IntentFilter.actionsIterator()
  # en onAttachedToActivity que dejaba la app en negro al reanudar.
  nfc_manager: ^4.2.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1
  sentry_flutter: ^8.0.0
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  jwt_decoder: ^2.0.1
  go_router: ^17.1.0
  flutter_animate: ^4.5.2
  android_play_install_referrer: ^0.4.0
  camera: ^0.11.2
  flutter_compass: ^0.8.0
  vector_math: ^2.1.4
  sensors_plus: ^6.1.1
  web: ^1.1.0
  # Selector de archivos (imágenes y PDFs) para los adjuntos del soporte.
  file_picker: ^8.1.4
  # Abre adjuntos descargados (PDFs principalmente) con el visor del sistema.
  open_filex: ^4.5.0
  # Directorio temporal donde guardar el adjunto antes de abrirlo.
  path_provider: ^2.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  go_router_builder: ^4.1.1
  build_runner: ^2.7.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4A1D3D"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/stops.json
    - assets/routes/
