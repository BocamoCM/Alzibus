
name: alzitrans
description: Aplicación para ver paradas de bus en Alzira y leer tarjetas NFC MIFARE Classic 1K
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  flutter_nfc_kit: ^3.5.0
  shared_preferences: ^2.3.3
  vibration: ^2.0.0
  http: ^1.2.2
  html: ^0.15.4
  device_info_plus: 11.3.0
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.2
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7
  home_widget: ^0.8.1
  package_info_plus: ^8.0.0
  nfc_manager: ^4.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1
  socket_io_client: ^3.1.4
  sentry_flutter: ^8.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4A1D3D"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/stops.json
    - assets/routes/
