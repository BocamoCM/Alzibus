name: alzibus
description: Aplicación para ver paradas de bus en Alzira y leer tarjetas NFC MIFARE Classic 1K
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  flutter_nfc_kit: ^3.5.0
  shared_preferences: ^2.3.3
  vibration: ^2.0.0
  android_alarm_manager_plus: ^4.0.3
  http: ^1.2.2
  html: ^0.15.4
  device_info_plus: 11.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/stops.json
